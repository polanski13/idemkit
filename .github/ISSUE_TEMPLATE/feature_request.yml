name: Feature request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, check the [Roadmap](https://github.com/polanski13/idemkit#roadmap) and existing issues — the feature may already be planned.

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What are you trying to do that the current API doesn't support?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: How would this work? A code snippet showing the imagined usage helps.
      render: go

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you try? Why weren't they sufficient?

  - type: checkboxes
    id: willing-to-pr
    attributes:
      label: Implementation
      options:
        - label: I'm willing to submit a PR (guidance welcome).
