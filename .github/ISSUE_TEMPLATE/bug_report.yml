name: Bug report
description: Something doesn't work as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, check [DESIGN.md "Known limitations"](https://github.com/polanski13/idemkit/blob/main/DESIGN.md#known-limitations-v01) — the bug may be a deliberate v0.1 trade-off scheduled for a later release.

  - type: input
    id: idemkit-version
    attributes:
      label: idemkit version
      description: Output of `go list -m github.com/polanski13/idemkit`
      placeholder: v0.1.0
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version
      description: Output of `go version`
      placeholder: go version go1.25.6 darwin/arm64
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Store backend
      options:
        - in-memory (store/mem)
        - custom (implements idemkit.Store)
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Smallest Go code that reproduces the issue. A `_test.go` file is ideal.
      render: go
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Stack traces, error messages, slog output, etc.
      render: shell
